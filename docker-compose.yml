services:
  campuslands-package:
    build:
      context: .
      dockerfile: Dockerfile.package
      args:
        REPOSITORY_NAME: campuslands-devs-javascript
        REPOSITORY_URL: https://github.com/anndreloopez012/campuslands-devs-javascript
    image: ghcr.io/anndreloopez012/campuslands-devs-javascript:local
    container_name: campuslands-devs-javascript-docs
    ports:
      - "8080:80"
    restart: unless-stopped
